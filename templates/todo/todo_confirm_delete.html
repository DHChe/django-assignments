{% extends "todo/base.html" %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="max-w-xl w-full mx-auto relative z-10">
    <main class="glass-card rounded-3xl overflow-hidden shadow-2xl ring-1 ring-slate-900/5 p-8">
        <h1 class="text-xl font-bold text-slate-900 mb-2">할 일 삭제</h1>
        <p class="text-slate-600 mb-6">정말 <strong>{{ object.title }}</strong>을(를) 삭제할까요?</p>
        <form method="post" action="">
            {% csrf_token %}
            <div class="flex gap-3 justify-end">
                <a href="{% url 'cbv_todo_detail' object.pk %}" class="inline-flex items-center px-5 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-200 rounded-full hover:bg-slate-50">취소</a>
                <button type="submit" class="inline-flex items-center px-5 py-2.5 text-sm font-semibold text-white bg-rose-600 rounded-full hover:bg-rose-700">삭제</button>
            </div>
        </form>
    </main>
</div>
{% endblock %}
